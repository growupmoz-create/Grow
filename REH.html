// ============================
// VERIFICAR SE É LIÇÃO DE AVALIAÇÃO
// ============================

function isLicaoAvaliacao(licao){
return licao === 16 || licao === 31 || licao === 46 || licao === 51;
}

function getTipoAvaliacao(licao){
if(licao === 16) return {numero: 1, titulo: "Avaliação 1", inicio: 0, fim: 15};
if(licao === 31) return {numero: 2, titulo: "Avaliação 2", inicio: 15, fim: 30};
if(licao === 46) return {numero: 3, titulo: "Avaliação 3", inicio: 30, fim: 45};
if(licao === 51) return {numero: 4, titulo: "Exame Geral", inicio: 0, fim: 50};
return null;
}

function getLicoesAvaliacao(inicio, fim){
let licoes = [];
for(let i = inicio; i < fim; i++){
licoes.push(temas[i]);
}
return licoes.join(", ");
}

function avaliacaoJaRealizada(licao){
let a = pegarAluno();
if(!a) return false;

if(licao === 16) return a.avaliacoesRealizadas.includes(1);
if(licao === 31) return a.avaliacoesRealizadas.includes(2);
if(licao === 46) return a.avaliacoesRealizadas.includes(3);
if(licao === 51) return a.avaliacoesRealizadas.includes(4);
return false;
}

licoes = temas.slice(0, 15).join(", ");
prompt = `Crie 20 perguntas de múltipla escolha sobre as seguintes lições de Recursos Humanos: ${licoes}.

Formato: 
1. Pergunta: [texto]

D) [alternativa]
Correta: [letra]`;
}
else if(tipoAvaliacao.numero === 2) {
licoes = temas.slice(15, 30).join(", ");
prompt = `Crie 20 perguntas de múltipla escolha sobre as seguintes lições de Recursos Humanos: ${licoes}.
Cada pergunta deve ter 4 alternativas (A, B, C, D) e indicar qual é a correta.
Formato:

B) [alternativa]

D) [alternativa]
Correta: [letra]`;
}

Cada pergunta deve ter 4 alternativas (A, B, C, D) e indicar qual é a correta.
Formato:

A) [alternativa]
B) [alternativa] 
C) [alternativa]
D) [alternativa]
Correta: [letra]`;

else if(tipoAvaliacao.numero === 4) {

prompt = `Crie 20 perguntas de múltipla escolha sobre todas as lições de Recursos Humanos: ${licoes}.
Cada pergunta deve ter 4 alternativas (A, B, C, D) e indicar qual é a correta.
Formato: 
1. Pergunta: [texto]
A) [alternativa]

C) [alternativa]

Correta: [letra]`;
}

],

<h2>${tipoAvaliacao.titulo}</h2>

<button onclick="telaLicao()">Voltar</button>
</div>
`;
}
}

function processarPerguntas(texto) {
let perguntas = [];
let linhas = texto.split('\n');
let perguntaAtual = null;

for(let linha of linhas) {
linha = linha.trim();
if(!linha) continue;

// Nova pergunta
if(linha.match(/^\d+\./)) {
if(perguntaAtual) {
perguntas.push(perguntaAtual);
}
perguntaAtual = {
texto: linha.replace(/^\d+\.\s*Pergunta:\s*/, '').replace(/^\d+\.\s*/, ''),
opcoes: [],
correta: null
};
}
// Alternativas
else if(linha.match(/^[A-D]\)/)) {
if(perguntaAtual) {
perguntaAtual.opcoes.push(linha);
}
}
// Resposta correta
else if(linha.toLowerCase().includes('correta:')) {
if(perguntaAtual) {
let letra = linha.match(/[A-D]/)?.[0];
if(letra) {
perguntaAtual.correta = letra.charCodeAt(0) - 65; // A=0, B=1, etc.
}
}
}
}

if(perguntaAtual) {
perguntas.push(perguntaAtual);
}

// Garantir 20 perguntas
while(perguntas.length < 20) {
perguntas.push({
texto: `Pergunta padrão ${perguntas.length+1} sobre RH`,
opcoes: ["Alternativa A", "Alternativa B", "Alternativa C", "Alternativa D"],
correta: 0
});
}

return perguntas.slice(0, 20);
}

function mostrarAvaliacao(perguntas, tipoAvaliacao) {

<button onclick="finalizarAvaliacao(${tipoAvaliacao.numero})">Finalizar Avaliação</button>
<button onclick="cancelarAvaliacao()">Cancelar</button>
`;

let container = document.getElementById("perguntas");
perguntas.forEach((p, idx) => {
container.innerHTML += `

${p.opcoes.map((op, oIdx) => `

</label>
`).join('')}

});

// Salvar perguntas para correção
window.perguntasAtuais = perguntas;
iniciarTemporizador(30 * 60, tipoAvaliacao.numero);
}

// ============================
// AVALIAÇÕES
// ============================

function iniciarTemporizador(segundos, numero){
let timer = setInterval(() => {
let mins = Math.floor(segundos / 60);
let secs = segundos % 60;
document.getElementById("temporizador").textContent = 
`${mins}:${secs < 10 ? '0' : ''}${secs}`;
segundos--;

if(segundos < 0){
clearInterval(timer);
alert("⏰ Tempo esgotado!");
finalizarAvaliacao(numero);
}
}, 1000);
window.timerAtual = timer;
}

function finalizarAvaliacao(numero){
if(window.timerAtual) clearInterval(window.timerAtual);

// Calcular nota baseada nas respostas
let respostasCorretas = 0;
for(let i=0; i<20; i++){
let resposta = document.querySelector(`input[name="pergunta${i}"]:checked`);
if(resposta && window.perguntasAtuais && window.perguntasAtuais[i]) {
if(parseInt(resposta.value) === window.perguntasAtuais[i].correta) {
respostasCorretas++;
}
}
}

let nota = respostasCorretas; // Cada pergunta vale 1 valor
let a = pegarAluno();

// Registrar avaliação
a.avaliacoesRealizadas.push(numero);
if(!a.resultados) a.resultados = [];
a.resultados.push({
avaliacao: numero,
nota: nota,
data: new Date().toLocaleString(),
respostasCorretas: respostasCorretas
});

// Enviar para WhatsApp
let titulo = numero === 4 ? "Exame Geral" : "Avaliação "+numero;
let mensagem = `*Resultado de ${titulo} - Curso RH*%0A%0A`;
mensagem += `👤 Aluno: ${a.nome}%0A`;
mensagem += `🆔 Código: ${a.codigo}%0A`;
mensagem += `📝 Avaliação: ${titulo}%0A`;
mensagem += `📊 Nota: ${nota}/20 valores%0A`;
mensagem += `✅ Acertos: ${respostasCorretas}/20%0A`;
mensagem += `📅 Data: ${new Date().toLocaleString()}%0A`;
mensagem += `✅ Status: ${nota >= 10 ? 'APROVADO' : 'REPROVADO'}`;

window.open(`https://wa.me/842044879?text=${mensagem}`, '_blank');

salvarAluno(a);

document.getElementById("app").innerHTML=`
<div class="resultado">
<h2>${titulo} - Concluída</h2>
<p><strong>Sua nota: ${nota}/20 valores</strong></p>
<p>Acertos: ${respostasCorretas} de 20 perguntas</p>
<p>Status: <strong style="color:${nota >= 10 ? 'green' : 'red'}">${nota >= 10 ? 'APROVADO' : 'REPROVADO'}</strong></p>
<p>✅ Resultado enviado para WhatsApp 842044879</p>
<button onclick="continuarAposAvaliacao()">Continuar Curso</button>
</div>
`;
}

function cancelarAvaliacao(){
if(window.timerAtual) clearInterval(window.timerAtual);
telaLicao();
}

function continuarAposAvaliacao(){
let a = pegarAluno();
a.licaoAtual++;
a.resumoEnviado = false;
a.fotos = [];
salvarAluno(a);
telaLicao();
}

// Fallback para perguntas padrão
function iniciarAvaliacaoPadrao(numero){
let titulos = ["Avaliação 1", "Avaliação 2", "Avaliação 3", "Exame Geral"];
let titulo = titulos[numero-1];

let perguntas = [];
for(let i=1; i<=20; i++){
perguntas.push({
texto: `Pergunta ${i} sobre ${numero === 4 ? 'todo o conteúdo' : 'as lições específicas'}`,
opcoes: ["Alternativa A", "Alternativa B", "Alternativa C", "Alternativa D"],
correta: 0
});
}

mostrarAvaliacao(perguntas, {numero, titulo});
}

// ============================
// PREVIEW DE FOTOS
// ============================

function previewFotos(){
let input=document.getElementById("fotoInput");
let preview=document.getElementById("preview");
preview.innerHTML="";

if(input.files.length > 3){
alert("Máximo 3 fotos.");
input.value="";
return;
}

for(let i=0;i<input.files.length;i++){
let reader=new FileReader();
reader.onload=function(e){
let img=document.createElement("img");
img.src=e.target.result;
img.className="preview-img";
preview.appendChild(img);
};
reader.readAsDataURL(input.files[i]);
}
}

// ============================
// ENVIAR RESUMO
// ============================

function enviarResumo(){
let input=document.getElementById("fotoInput");

if(input.files.length < 1){
alert("Envie pelo menos 1 foto.");
return;
}

if(input.files.length > 3){
alert("Máximo 3 fotos.");
return;
}

let fotosBase64=[];

for(let i=0;i<input.files.length;i++){
let reader=new FileReader();
reader.onload=function(e){
fotosBase64.push(e.target.result);

if(fotosBase64.length === input.files.length){
let a=pegarAluno();
a.resumoEnviado=true;
a.fotos=fotosBase64;
salvarAluno(a);
alert("Resumo enviado com sucesso!");
telaLicao();
}
};
reader.readAsDataURL(input.files[i]);
}
}

// ============================
// AVANÇAR
// ============================

function continuar(){
let a=pegarAluno();

if(!a.resumoEnviado){
alert("Envie o resumo primeiro.");
return;
}

if(a.licaoAtual < temas.length){
a.licaoAtual++;
a.resumoEnviado=false;
a.fotos=[];
salvarAluno(a);
telaLicao();
}else if(a.licaoAtual === temas.length){
a.licaoAtual++; // Vai para 51 para ativar exame geral
salvarAluno(a);
telaLicao();
}else{
alert("Parabéns! Curso concluído!");
localStorage.removeItem("aluno");
telaLogin();
}
}

},

messages:[

}catch{

// ============================
// INICIAR
// ============================

if(pegarAluno()){
telaDashboard();
}else{
telaLogin();
}

</script>
