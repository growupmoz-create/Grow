<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Exame Geral Final - Logística e Supply Chain</title>

<style>

body{
font-family: Arial;
background:#eef2f7;
margin:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:1000px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{

color:#2c3e50;
}

.question{

}

</style>
</head>

<body>

<div class="container">

<h1>Exame Geral Final</h1>

<p><b>Curso:</b> Gestão de Logística e Supply Chain</p>
<p><b>Duração:</b> 120 minutos</p>
<p><b>Total:</b> 50 perguntas (20 Valores)</p>

<form id="quiz">

<script>

const perguntas = [

"1. Diferença entre Logística e SCM?",

"14. WMS serve para:",

"16. Frete de retorno:",
"17. Corredor de Nacala é importante para:",

"31. Base logística em Oil & Gas:",

"43. Segregação de funções:",
"44. MRO:",
"45. Gestor logístico estratégico:",
"46. Bump-out:",
"47. Logística 4.0/5.0:",
"48. KPI:",
"49. Conteúdo local:",
"50. Ética na logística:"

];

const opcoes = [
["Logística operacional; SCM estratégico","Controle simples","Preço+custos totais","Tempo entre pedido e receção","Diferença sistema vs físico","Proteger contra incertezas","Primeiro a entrar sai primeiro","Oscilações na cadeia","Pedido vs manutenção","Alto risco baixo impacto"],
["Reduz estoque","Rodoviário","Movimentação mecânica","Gerir armazém","Carga consolidada","Evitar camião vazio","Escoamento mineração","Dividir armazém por áreas","Entre portos do país","Rotação estoque"],
["DDP","Carga embarcada","Contrato transporte","Desembaraço digital","Classificação aduaneira","CIF+10%","Importar temporariamente","Vendedor","Redução impostos","Verificação documental"],
["Apoiar operações","Vacinas alimentos","Retorno produtos","Revisões programadas","Entrega no prazo completo","Salvar vidas","Entrega final","Validade mais próxima","Empresa certificada","Perdas pós-colheita"],
["Identificar falhas","Reduzir impacto ambiental","Evitar fraudes","Manutenção reparação operações","Equilibrar custo serviço","Desmontagem evento","IA automação","Medir desempenho","Empresas locais","Transparência"]

];

</script>

<div id="perguntas"></div>

<button type="button" onclick="corrigir()">Submeter Exame</button>

</form>

<div class="result" id="resultado"></div>

</div>

<script>

const respostasCorretas = [
"a","b","b","b","b","b","b","b","b","b",
"b","c","b","b","b","b","a","b","a","b",
"c","c","b","b","b","b","a","b","b","b",
"b","b","b","b","b","b","b","b","b","b",
"b","b","b","a","b","b","b","b","b","b"
];

let container = document.getElementById("perguntas");

let contador = 0;

for(let bloco=0; bloco<5; bloco++){

for(let i=0;i<10;i++){

let q = contador+1;

let html = "<div class='question'>";
html += "<p>"+perguntas[contador]+"</p>";

let letras=["a","b","c","d"];

for(let j=0;j<4;j++){
html += "<input type='radio' name='q"+q+"' value='"+letras[j]+"'> "+letras[j]+") "+opcoes[bloco][j]+"<br>";
}

html += "</div>";

container.innerHTML += html;

contador++;

}

}

function corrigir(){

let pontos = 0;

for(let i=1;i<=50;i++){

let resp = document.querySelector("input[name='q"+i+"']:checked");

if(resp && resp.value === respostasCorretas[i-1]){
pontos++;
}

}

let nota = (pontos*0.4).toFixed(1);

document.getElementById("resultado").innerHTML =
"Acertos: "+pontos+"/50 <br> Nota Final: "+nota+" / 20 valores";

}

</script>

</html>
